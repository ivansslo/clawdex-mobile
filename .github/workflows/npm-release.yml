name: NPM Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "Override npm dist-tag (use 'auto' to infer from version)"
        required: false
        default: "auto"
        type: string
      publish_package:
        description: "Publish to npm after the cross-platform build completes"
        required: false
        default: false
        type: boolean

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_bridge_binaries:
    name: Build bridge binary (${{ matrix.package_target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            package_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            binary_path: services/rust-bridge/target/aarch64-apple-darwin/release/codex-rust-bridge
            build_mode: host
            apt_packages: ""
            linker: ""
            linker_env: ""
            build_container: ""
            max_glibc: ""
          - runner: macos-26-intel
            package_target: darwin-x64
            rust_target: x86_64-apple-darwin
            binary_path: services/rust-bridge/target/x86_64-apple-darwin/release/codex-rust-bridge
            build_mode: host
            apt_packages: ""
            linker: ""
            linker_env: ""
            build_container: ""
            max_glibc: ""
          - runner: ubuntu-latest
            package_target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            binary_path: services/rust-bridge/target/x86_64-unknown-linux-gnu/release/codex-rust-bridge
            build_mode: linux-compat
            apt_packages: ""
            linker: ""
            linker_env: ""
            build_container: ubuntu:20.04
            max_glibc: "2.31"
          - runner: ubuntu-latest
            package_target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            binary_path: services/rust-bridge/target/aarch64-unknown-linux-gnu/release/codex-rust-bridge
            build_mode: linux-compat
            apt_packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            build_container: ubuntu:20.04
            max_glibc: "2.31"
          - runner: ubuntu-latest
            package_target: linux-armv7l
            rust_target: armv7-unknown-linux-gnueabihf
            binary_path: services/rust-bridge/target/armv7-unknown-linux-gnueabihf/release/codex-rust-bridge
            build_mode: linux-compat
            apt_packages: gcc-arm-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER
            build_container: ubuntu:20.04
            max_glibc: "2.31"
          - runner: windows-latest
            package_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
            binary_path: services/rust-bridge/target/x86_64-pc-windows-msvc/release/codex-rust-bridge.exe
            build_mode: host
            apt_packages: ""
            linker: ""
            linker_env: ""
            build_container: ""
            max_glibc: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Setup Rust toolchain
        if: matrix.build_mode == 'host'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        if: matrix.build_mode == 'host'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target

      - name: Install Linux cross toolchain
        if: matrix.build_mode == 'host' && matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross linker
        if: matrix.build_mode == 'host' && matrix.linker_env != ''
        shell: bash
        run: |
          echo "${{ matrix.linker_env }}=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build bridge binary
        if: matrix.build_mode == 'host'
        working-directory: services/rust-bridge
        run: cargo build --release --locked --target ${{ matrix.rust_target }}

      - name: Build Linux bridge binary in compatibility container
        if: matrix.build_mode == 'linux-compat'
        env:
          BUILD_CONTAINER: ${{ matrix.build_container }}
          RUST_TARGET: ${{ matrix.rust_target }}
          CONTAINER_APT_PACKAGES: ${{ matrix.apt_packages }}
          LINKER: ${{ matrix.linker }}
          LINKER_ENV: ${{ matrix.linker_env }}
        run: |
          docker run --rm \
            -e RUST_TARGET \
            -e CONTAINER_APT_PACKAGES \
            -e LINKER \
            -e LINKER_ENV \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${BUILD_CONTAINER}" \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              sed -i "s|http://archive.ubuntu.com/ubuntu|http://azure.archive.ubuntu.com/ubuntu|g; s|http://security.ubuntu.com/ubuntu|http://azure.archive.ubuntu.com/ubuntu|g" /etc/apt/sources.list
              retry() {
                local attempts=0
                while true; do
                  if "$@"; then
                    return 0
                  fi
                  attempts=$((attempts + 1))
                  if [ "${attempts}" -ge 5 ]; then
                    return 1
                  fi
                  sleep $((attempts * 5))
                done
              }
              retry apt-get -o Acquire::Retries=5 update
              retry apt-get install -y ca-certificates curl build-essential pkg-config ${CONTAINER_APT_PACKAGES}
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              . "$HOME/.cargo/env"
              rustup target add "${RUST_TARGET}"
              if [ -n "${LINKER_ENV}" ]; then
                export "${LINKER_ENV}=${LINKER}"
              fi
              cargo build --release --locked --manifest-path services/rust-bridge/Cargo.toml --target "${RUST_TARGET}"
            '
          sudo chown -R "$(id -u):$(id -g)" services/rust-bridge/target

      - name: Verify Linux glibc floor
        if: matrix.max_glibc != ''
        env:
          BINARY_PATH: ${{ matrix.binary_path }}
          MAX_GLIBC: ${{ matrix.max_glibc }}
        run: |
          REQUIRED_GLIBC="$(
            strings "${BINARY_PATH}" \
              | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/GLIBC_//' \
              | sort -V \
              | tail -n 1 || true
          )"
          if [ -z "${REQUIRED_GLIBC}" ]; then
            echo "Failed to determine required glibc version for ${BINARY_PATH}."
            exit 1
          fi
          if [ "$(printf '%s\n%s\n' "${REQUIRED_GLIBC}" "${MAX_GLIBC}" | sort -V | tail -n 1)" != "${MAX_GLIBC}" ]; then
            echo "Binary ${BINARY_PATH} requires glibc ${REQUIRED_GLIBC}, expected <= ${MAX_GLIBC}."
            exit 1
          fi
          echo "Binary ${BINARY_PATH} requires glibc ${REQUIRED_GLIBC} (ok <= ${MAX_GLIBC})."

      - name: Stage packaged bridge binary
        run: node scripts/bridge-binary.js stage --target ${{ matrix.package_target }} --from ${{ matrix.binary_path }}

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v6
        with:
          name: bridge-binaries-${{ matrix.package_target }}
          path: vendor/bridge-binaries/${{ matrix.package_target }}/

  publish:
    name: Publish package to npm
    needs: build_bridge_binaries
    if: github.event_name != 'workflow_dispatch' || inputs.publish_package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # create the GitHub release on tag pushes
      id-token: write # OIDC trusted publishing to npm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest # trusted publishing (OIDC) requires npm >= 11.5.1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target

      - name: Install dependencies
        run: npm ci

      - name: Download packaged bridge binaries
        uses: actions/download-artifact@v7
        with:
          pattern: bridge-binaries-*
          path: .artifacts/bridge-binaries

      - name: Restage packaged bridge binaries
        run: |
          rm -rf vendor/bridge-binaries
          mkdir -p vendor/bridge-binaries
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 linux-armv7l win32-x64; do
            case "$target" in
              win32-x64) binary_name="codex-rust-bridge.exe" ;;
              *) binary_name="codex-rust-bridge" ;;
            esac
            source_path=".artifacts/bridge-binaries/bridge-binaries-${target}/${binary_name}"
            if [ ! -f "$source_path" ]; then
              echo "Missing downloaded bridge artifact for ${target}: ${source_path}"
              exit 1
            fi
            node scripts/bridge-binary.js stage --target "$target" --from "$source_path"
          done

      - name: Verify packaged bridge bundle layout
        run: |
          test -f vendor/bridge-binaries/darwin-arm64/codex-rust-bridge
          test -f vendor/bridge-binaries/darwin-x64/codex-rust-bridge
          test -f vendor/bridge-binaries/linux-x64/codex-rust-bridge
          test -f vendor/bridge-binaries/linux-arm64/codex-rust-bridge
          test -f vendor/bridge-binaries/linux-armv7l/codex-rust-bridge
          test -f vendor/bridge-binaries/win32-x64/codex-rust-bridge.exe

      - name: Verify Rust bridge compiles
        working-directory: services/rust-bridge
        run: cargo check --locked

      - name: Run monorepo quality gates
        run: |
          npm run lint
          npm run typecheck
          npm run test

      - name: Verify package is publishable
        run: |
          node -e "const p=require('./package.json'); if (p.private) { throw new Error('package.json has private=true; cannot publish'); } if (!p.name || !p.version) { throw new Error('package.json must include name + version'); }"

      - name: Verify tag version matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match package.json version (${PACKAGE_VERSION})."
            exit 1
          fi

      - name: Show package contents
        run: npm pack --dry-run

      - name: Verify tarball contains packaged bridge targets
        run: |
          TMPDIR="$(mktemp -d)"
          TARBALL="$(npm pack --silent --pack-destination "$TMPDIR" | tail -n 1)"
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/darwin-arm64/codex-rust-bridge$'
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/darwin-x64/codex-rust-bridge$'
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/linux-x64/codex-rust-bridge$'
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/linux-arm64/codex-rust-bridge$'
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/linux-armv7l/codex-rust-bridge$'
          tar -tzf "$TMPDIR/$TARBALL" | grep -q '^package/vendor/bridge-binaries/win32-x64/codex-rust-bridge.exe$'

      - name: Resolve publish target
        id: publish_target
        env:
          WORKFLOW_NPM_TAG: ${{ github.event.inputs.npm_tag || '' }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PRERELEASE_TAG="$(node -e "const version=require('./package.json').version; const match=version.match(/-([0-9A-Za-z-]+)(?:\\.|$)/); process.stdout.write(match ? match[1] : '')")"
          if [ -n "${WORKFLOW_NPM_TAG}" ] && [ "${WORKFLOW_NPM_TAG}" != "auto" ]; then
            PUBLISH_TAG="${WORKFLOW_NPM_TAG}"
          elif [ -n "${PRERELEASE_TAG}" ]; then
            PUBLISH_TAG="${PRERELEASE_TAG}"
          else
            PUBLISH_TAG="latest"
          fi
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_tag=${PUBLISH_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "${PRERELEASE_TAG}" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "publish_needed=false" >> "$GITHUB_OUTPUT"
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved npm dist-tag: ${PUBLISH_TAG}"

      - name: Publish to npm (OIDC trusted publishing)
        if: steps.publish_target.outputs.publish_needed == 'true'
        run: npm publish --access public --tag "${{ steps.publish_target.outputs.publish_tag }}"

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.publish_target.outputs.package_version }}
        run: |
          RELEASE_NOTES_FILE="docs/release-notes/${PACKAGE_VERSION}.md"
          RELEASE_NOTES_CREATE_ARGS=(--generate-notes)
          RELEASE_NOTES_EDIT_ARGS=()
          if [ -f "${RELEASE_NOTES_FILE}" ]; then
            RELEASE_NOTES_CREATE_ARGS=(--notes-file "${RELEASE_NOTES_FILE}")
            RELEASE_NOTES_EDIT_ARGS=(--notes-file "${RELEASE_NOTES_FILE}")
          fi

          if [ "${{ steps.publish_target.outputs.is_prerelease }}" = "true" ]; then
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              gh release edit "${GITHUB_REF_NAME}" --prerelease "${RELEASE_NOTES_EDIT_ARGS[@]}"
            else
              gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" "${RELEASE_NOTES_CREATE_ARGS[@]}" --prerelease
            fi
          else
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              gh release edit "${GITHUB_REF_NAME}" --latest "${RELEASE_NOTES_EDIT_ARGS[@]}"
            else
              gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" "${RELEASE_NOTES_CREATE_ARGS[@]}" --latest
            fi
          fi
