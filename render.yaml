services:
  - type: web
    name: clawdex-mobile-bridge
    runtime: node
    region: singapore
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build -w @codex/mac-bridge
    startCommand: ./scripts/render-start-tailscale-authkey.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: BRIDGE_AUTH_TOKEN
        generateValue: true
      - key: BRIDGE_CORS_ORIGINS
        sync: false
      - key: BRIDGE_ALLOW_QUERY_TOKEN_AUTH
        value: "false"
      - key: BRIDGE_DISABLE_TERMINAL_EXEC
        value: "true"
      - key: TS_AUTHKEY
        sync: false
      - key: TS_HOSTNAME
        value: tailsup
      - key: TS_SERVE
        value: "true"
